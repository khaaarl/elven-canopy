# Build & Package workflow: Build the Rust GDExtension library and package the
# game via Godot's export pipeline for Linux, Windows, macOS, Android, and iOS.
#
# Triggered manually via workflow_dispatch. Requires a passing CI run (ci.yml)
# for the same commit before any builds start. If no CI run exists, one is
# triggered automatically. Waits up to 15 minutes for CI to complete.
#
# Caveats:
# - Android: Exports a debug/unsigned APK. For release, add ANDROID_KEYSTORE_* secrets.
# - iOS: Exports an unsigned Xcode project. For App Store, add Apple signing secrets.
# - macOS: Not code-signed or notarized. Users will need to bypass Gatekeeper.
# - Mobile gdext: Experimental. If Android/iOS jobs fail, desktop builds still succeed.

name: Build & Package

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub Release with the built artifacts"
        required: false
        type: boolean
        default: false
      release_tag:
        description: "Release tag (e.g. v0.1.0). Leave blank for date-based."
        required: false
        type: string
        default: ""

env:
  GODOT_VERSION: "4.6.1"
  # *** CACHE_EPOCH — MUST BE KEPT IN SYNC WITH ci.yml ***
  # Bump this to invalidate ALL caches (apt packages AND Rust dependency
  # artifacts). You MUST bump it in BOTH workflow files at the same time.
  # Reasons to bump: apt dependency changes that affect compiled output
  # (e.g., new libclang version changing bindgen output), or stale cache
  # causing mysterious build failures.
  # Last bumped: 2026-04-07
  CACHE_EPOCH: v2
  # Forces all JS-based actions to run on Node 24 ahead of GitHub's mandatory
  # switch on 2026-06-02. Becomes a no-op after that date and can be removed.
  # (Assessed 2026-04-07.)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Resolve version tag (runs in parallel with require-ci)
  # ---------------------------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Determine version tag
        id: tag
        run: |
          if [[ -z "${{ inputs.release_tag }}" ]]; then
            echo "tag=v$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved tag: $(grep tag= "$GITHUB_OUTPUT" | tail -1)"

  # ---------------------------------------------------------------------------
  # Require a passing CI run for this commit before building
  # ---------------------------------------------------------------------------
  require-ci:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Wait for CI to pass
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          TIMEOUT=900
          INTERVAL=30
          ELAPSED=0
          TRIGGERED=false

          while [ $ELAPSED -lt $TIMEOUT ]; do
            # Query all CI runs for this commit that have completed
            CONCLUSION=$(gh run list --repo "$REPO" --workflow ci.yml \
              --commit "$SHA" --status completed --json conclusion \
              -q '.[0].conclusion')

            if [ "$CONCLUSION" = "success" ]; then
              echo "CI passed for $SHA"
              exit 0
            elif [ -n "$CONCLUSION" ]; then
              # Any completed non-success conclusion (failure, cancelled, timed_out, etc.)
              echo "::error::CI finished with conclusion '$CONCLUSION' for $SHA — aborting build"
              exit 1
            fi

            # If no CI run exists at all (no completed, no in-progress), trigger one
            if [ "$TRIGGERED" = "false" ]; then
              ANY=$(gh run list --repo "$REPO" --workflow ci.yml \
                --commit "$SHA" --json status -q '.[0].status')
              if [ -z "$ANY" ]; then
                echo "No CI run found for $SHA — triggering one"
                gh workflow run ci.yml --repo "$REPO" --ref "${{ github.ref_name }}"
                TRIGGERED=true
              fi
            fi

            echo "Waiting for CI... (${ELAPSED}s / ${TIMEOUT}s)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "::error::Timed out waiting for CI to pass on $SHA (${TIMEOUT}s)"
          exit 1

  # ---------------------------------------------------------------------------
  # Linux (x86_64)
  # ---------------------------------------------------------------------------
  build-linux:
    needs: [require-ci, prepare]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Swatinem/rust-cache: stay on @v2 — there is no v3. The v2 line already
      # uses @actions/cache v6+ internally (fixed in v2.7.8), so it is NOT
      # affected by the actions/cache v1/v2 deprecation. Only caches dependency
      # artifacts (not workspace crates) by default. (Assessed 2026-04-07.)
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ env.CACHE_EPOCH }}
          key: linux

      - uses: ./.github/actions/install-llama-deps
        with:
          cache-epoch: ${{ env.CACHE_EPOCH }}

      - name: Build GDExtension library
        run: cargo build --release -p elven_canopy_gdext

      - name: Install library for Godot
        run: |
          mkdir -p godot/target/release godot/target/debug
          cp target/release/libelven_canopy_gdext.so godot/target/release/
          cp target/release/libelven_canopy_gdext.so godot/target/debug/

      # chickensoft-games/setup-godot: @v2 floating tag resolves to latest v2.x
      # (currently v2.4.1). Uses @actions/cache npm v6+ internally and runs on
      # Node 24 — unaffected by the actions/cache deprecation. (Assessed 2026-04-07.)
      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Import Godot project
        run: godot --headless --path godot --import --quit 2>&1 || true

      - name: Export game
        run: |
          mkdir -p build/linux
          godot --headless --path godot --export-release "Linux" \
            "${GITHUB_WORKSPACE}/build/linux/elven-canopy.x86_64"

      - name: Create archive
        run: tar czf "elven-canopy-${{ needs.prepare.outputs.version_tag }}-linux-x86_64.tar.gz" -C build/linux .

      - uses: actions/upload-artifact@v4
        with:
          name: elven-canopy-${{ needs.prepare.outputs.version_tag }}-linux-x86_64
          path: "elven-canopy-${{ needs.prepare.outputs.version_tag }}-linux-x86_64.tar.gz"

  # ---------------------------------------------------------------------------
  # Windows (x86_64)
  # ---------------------------------------------------------------------------
  build-windows:
    needs: [require-ci, prepare]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ env.CACHE_EPOCH }}
          key: windows

      # KyleMayes/install-llvm-action: provides libclang for bindgen on Windows.
      # Latest is v2.0.9 (no v3 exists). Uses @actions/tool-cache (NOT
      # @actions/cache), so unaffected by the cache v1/v2 deprecation.
      # (Assessed 2026-04-07.)
      - name: Install LLVM (for bindgen/libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"

      # jakoch/install-vulkan-sdk-action: downloads the official pre-built
      # LunarG SDK. Actively maintained (v1.4.0, Jan 2026). Replaced
      # humbletim/setup-vulkan-sdk which built from Khronos source and became
      # unreliable on Windows runners. Stripdown + cache reduces repeated
      # download overhead. (Assessed 2026-04-09.)
      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1.4.0
        with:
          # No strong dependency on a specific version — just needs to be
          # stable and available. 1.4.328.1 chosen because it's what the
          # action author uses in their own CI. Bump freely if needed.
          vulkan_version: 1.4.328.1
          install_runtime: true
          cache: true
          stripdown: true

      - name: Build GDExtension library
        run: cargo build --release -p elven_canopy_gdext

      - name: Install library for Godot
        shell: bash
        run: |
          mkdir -p godot/target/release godot/target/debug
          cp target/release/elven_canopy_gdext.dll godot/target/release/
          cp target/release/elven_canopy_gdext.dll godot/target/debug/

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Import Godot project
        shell: bash
        run: godot --headless --path godot --import --quit 2>&1 || true

      - name: Export game
        shell: bash
        run: |
          mkdir -p build/windows
          godot --headless --path godot --export-release "Windows" \
            "${GITHUB_WORKSPACE}/build/windows/elven-canopy.exe"

      - name: Create archive
        shell: bash
        run: 7z a "elven-canopy-${{ needs.prepare.outputs.version_tag }}-windows-x86_64.zip" ./build/windows/*

      - uses: actions/upload-artifact@v4
        with:
          name: elven-canopy-${{ needs.prepare.outputs.version_tag }}-windows-x86_64
          path: "elven-canopy-${{ needs.prepare.outputs.version_tag }}-windows-x86_64.zip"

  # ---------------------------------------------------------------------------
  # macOS (universal: aarch64 + x86_64)
  # ---------------------------------------------------------------------------
  build-macos:
    needs: [require-ci, prepare]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ env.CACHE_EPOCH }}
          key: macos

      - name: Build GDExtension library (aarch64)
        run: cargo build --release -p elven_canopy_gdext --target aarch64-apple-darwin

      - name: Build GDExtension library (x86_64)
        run: cargo build --release -p elven_canopy_gdext --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p target/release
          lipo -create \
            target/aarch64-apple-darwin/release/libelven_canopy_gdext.dylib \
            target/x86_64-apple-darwin/release/libelven_canopy_gdext.dylib \
            -output target/release/libelven_canopy_gdext.dylib

      - name: Install library for Godot
        run: |
          mkdir -p godot/target/release godot/target/debug
          cp target/release/libelven_canopy_gdext.dylib godot/target/release/
          cp target/release/libelven_canopy_gdext.dylib godot/target/debug/

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Import Godot project
        run: godot --headless --path godot --import --quit 2>&1 || true

      - name: Export game
        run: |
          mkdir -p build/macos
          godot --headless --path godot --export-release "macOS" \
            "${GITHUB_WORKSPACE}/build/macos/ElvenCanopy.app"

      - name: Create archive
        run: cd build/macos && zip -ry "../../elven-canopy-${{ needs.prepare.outputs.version_tag }}-macos-universal.zip" ElvenCanopy.app

      - uses: actions/upload-artifact@v4
        with:
          name: elven-canopy-${{ needs.prepare.outputs.version_tag }}-macos-universal
          path: "elven-canopy-${{ needs.prepare.outputs.version_tag }}-macos-universal.zip"

  # ---------------------------------------------------------------------------
  # Android (arm64-v8a) — debug/unsigned APK
  #
  # DISABLED: Cross-compiling llama.cpp's Vulkan backend for Android arm64
  # fails (missing VULKAN_LIBRARY). Not worth fixing — Android is not a
  # target platform. To re-enable, remove the `if: false` line below and
  # set up Android Vulkan SDK in the build environment.
  # ---------------------------------------------------------------------------
  build-android:
    if: false  # disabled — see comment above
    needs: [require-ci, prepare]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ env.CACHE_EPOCH }}
          key: android
      - uses: android-actions/setup-android@v3

      - uses: ./.github/actions/install-llama-deps
        with:
          cache-epoch: ${{ env.CACHE_EPOCH }}

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkey -v -keystore ~/.android/debug.keystore \
              -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build GDExtension library (Android arm64)
        run: |
          cargo install cargo-ndk
          cargo ndk -t arm64-v8a build --release -p elven_canopy_gdext
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Build GDExtension library (host Linux x86_64)
        run: cargo build --release -p elven_canopy_gdext

      - name: Install libraries for Godot
        run: |
          mkdir -p godot/target/release godot/target/debug
          cp target/release/libelven_canopy_gdext.so godot/target/release/
          cp target/release/libelven_canopy_gdext.so godot/target/debug/
          mkdir -p godot/target/aarch64-linux-android/release godot/target/aarch64-linux-android/debug
          cp target/aarch64-linux-android/release/libelven_canopy_gdext.so godot/target/aarch64-linux-android/release/
          cp target/aarch64-linux-android/release/libelven_canopy_gdext.so godot/target/aarch64-linux-android/debug/

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Configure Godot editor settings for Android
        run: |
          GODOT_CONFIG="${HOME}/.config/godot"
          mkdir -p "${GODOT_CONFIG}"
          cat > "${GODOT_CONFIG}/editor_settings-4.tres" << 'EOF'
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "/usr/local/lib/android/sdk"
          export/android/debug_keystore = "/home/runner/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Import Godot project
        run: godot --headless --path godot --import --quit 2>&1 || true

      - name: Export game
        run: |
          mkdir -p build/android
          godot --headless --path godot --export-debug "Android" \
            "${GITHUB_WORKSPACE}/build/android/elven-canopy.apk"

      - name: Rename APK with version
        run: cp build/android/elven-canopy.apk "elven-canopy-${{ needs.prepare.outputs.version_tag }}-android-arm64.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: elven-canopy-${{ needs.prepare.outputs.version_tag }}-android-arm64
          path: "elven-canopy-${{ needs.prepare.outputs.version_tag }}-android-arm64.apk"

  # ---------------------------------------------------------------------------
  # iOS (arm64) — unsigned Xcode project
  # Requires real Apple Developer credentials (team ID, icons, signing) to
  # fully succeed. Marked continue-on-error so it doesn't block releases.
  #
  # DISABLED: This job has never passed — it needs real Apple signing
  # credentials we don't have yet. Kept here for when we set those up.
  # To re-enable, remove the `if: false` line below.
  # ---------------------------------------------------------------------------
  build-ios:
    if: false  # disabled — see comment above
    needs: [require-ci, prepare]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ env.CACHE_EPOCH }}
          key: ios

      - name: Build GDExtension library (iOS arm64)
        run: cargo build --release -p elven_canopy_gdext --target aarch64-apple-ios

      - name: Build GDExtension library (host macOS)
        run: cargo build --release -p elven_canopy_gdext

      - name: Create .framework bundle
        run: |
          FW="target/aarch64-apple-ios/release/elven_canopy_gdext.framework"
          mkdir -p "${FW}"
          cp target/aarch64-apple-ios/release/libelven_canopy_gdext.dylib \
            "${FW}/elven_canopy_gdext"
          cat > "${FW}/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>elven_canopy_gdext</string>
            <key>CFBundleIdentifier</key>
            <string>com.elvencanopy.gdext</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundlePackageType</key>
            <string>FMWK</string>
            <key>MinimumOSVersion</key>
            <string>12.0</string>
          </dict>
          </plist>
          PLIST

      - name: Install libraries for Godot
        run: |
          mkdir -p godot/target/release godot/target/debug
          cp target/release/libelven_canopy_gdext.dylib godot/target/release/
          cp target/release/libelven_canopy_gdext.dylib godot/target/debug/
          mkdir -p godot/target/aarch64-apple-ios/release godot/target/aarch64-apple-ios/debug
          cp -R target/aarch64-apple-ios/release/elven_canopy_gdext.framework godot/target/aarch64-apple-ios/release/
          cp -R target/aarch64-apple-ios/release/elven_canopy_gdext.framework godot/target/aarch64-apple-ios/debug/

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Import Godot project
        run: godot --headless --path godot --import --quit 2>&1 || true

      - name: Export game
        run: |
          mkdir -p build/ios
          godot --headless --path godot --export-debug "iOS" \
            "${GITHUB_WORKSPACE}/build/ios/elven-canopy.xcodeproj"

      - name: Create archive
        run: cd build && zip -r "../elven-canopy-${{ needs.prepare.outputs.version_tag }}-ios-arm64.zip" ios/

      - uses: actions/upload-artifact@v4
        with:
          name: elven-canopy-${{ needs.prepare.outputs.version_tag }}-ios-arm64
          path: "elven-canopy-${{ needs.prepare.outputs.version_tag }}-ios-arm64.zip"

  # ---------------------------------------------------------------------------
  # Relay server (Linux x86_64) — standalone multiplayer relay binary
  # ---------------------------------------------------------------------------
  build-relay-linux:
    needs: [require-ci, prepare]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ env.CACHE_EPOCH }}
          key: relay-linux

      - name: Build relay binary
        run: cargo build -p elven_canopy_relay --profile relay-release --bin relay

      - name: Rename binary
        run: cp target/relay-release/relay "elven-canopy-relay-${{ needs.prepare.outputs.version_tag }}-linux-x86_64"

      - uses: actions/upload-artifact@v4
        with:
          name: elven-canopy-relay-${{ needs.prepare.outputs.version_tag }}-linux-x86_64
          path: "elven-canopy-relay-${{ needs.prepare.outputs.version_tag }}-linux-x86_64"

  # ---------------------------------------------------------------------------
  # Create GitHub Release (optional)
  # ---------------------------------------------------------------------------
  release:
    if: ${{ inputs.create_release }}
    needs: [prepare, build-linux, build-windows, build-macos, build-relay-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.prepare.outputs.version_tag }}"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Elven Canopy $TAG" \
            --generate-notes \
            artifacts/elven-canopy-*
