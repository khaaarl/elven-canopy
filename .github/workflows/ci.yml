# CI workflow: Formatting, linting, tests, and coverage for Rust and GDScript.
#
# Five independent jobs:
# - rust-lint: cargo fmt --check + cargo clippy (no Godot needed, fast)
# - gdext-build: compile-check elven_canopy_gdext (Godot binding crate)
# - rust-test: unit tests + multiplayer integration tests (high thread count)
# - coverage: code coverage via cargo-llvm-cov, uploaded to Codecov
# - gdscript: gdformat --check + gdlint
#
# Triggers on pushes and pull requests that touch relevant files.

name: CI

on:
  push:
    paths:
      - "**.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rustfmt.toml"
      - "elven_canopy_*/Cargo.toml"
      - "tabulosity/**"
      - "tabulosity_derive/**"
      - "multiplayer_tests/**"
      - "godot/scripts/**.gd"
      - ".gdlintrc"
      - "python/requirements-dev.txt"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "**.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rustfmt.toml"
      - "elven_canopy_*/Cargo.toml"
      - "tabulosity/**"
      - "tabulosity_derive/**"
      - "multiplayer_tests/**"
      - "godot/scripts/**.gd"
      - ".gdlintrc"
      - "python/requirements-dev.txt"
      - ".github/workflows/ci.yml"

# Override the workspace opt-level=1 (from Cargo.toml [profile.dev]) to avoid
# the optimization compile-time cost in CI, where cold builds are common.
env:
  CARGO_PROFILE_DEV_OPT_LEVEL: 0

jobs:
  rust-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --workspace -- -D warnings

  gdext-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Compile-check gdext
        run: cargo build -p elven_canopy_gdext

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Tabulosity tests run separately to avoid Cargo feature unification:
      # elven_canopy_sim depends on tabulosity with features=["serde"], which
      # would activate the serde feature for tabulosity's own test targets.
      - name: Run tabulosity tests
        run: cargo test -p tabulosity -p tabulosity_derive -- --test-threads=16

      - name: Run tabulosity serde tests
        run: cargo test -p tabulosity --features serde --test serde -- --test-threads=16

      - name: Run all other crate tests
        run: cargo test -p elven_canopy_prng -p elven_canopy_lang -p elven_canopy_sim -p elven_canopy_protocol -p elven_canopy_relay -p elven_canopy_music -p multiplayer_tests -- --test-threads=16

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # Tabulosity runs separately to avoid Cargo feature unification (see rust-test job).
      - name: Generate tabulosity coverage
        run: cargo llvm-cov --no-report -p tabulosity -p tabulosity_derive -- --test-threads=16

      - name: Generate coverage (other crates)
        run: cargo llvm-cov --no-report --workspace --exclude elven_canopy_gdext --exclude tabulosity --exclude tabulosity_derive -- --test-threads=16

      - name: Generate coverage report
        run: cargo llvm-cov report --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false

  gdscript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gdtoolkit
        run: pip install -r python/requirements-dev.txt

      - name: Check GDScript formatting
        run: gdformat --check --line-length 100 godot/scripts/*.gd

      - name: Run GDScript linter
        run: gdlint godot/scripts/*.gd
