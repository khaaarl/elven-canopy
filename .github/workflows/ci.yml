# CI workflow: Formatting, linting, tests, and coverage for Rust and GDScript.
#
# Seven independent jobs:
# - rust-lint: cargo fmt --check + cargo clippy (no Godot needed, fast)
# - gdext-build: compile-check elven_canopy_gdext (Godot binding crate)
# - rust-test: unit tests + multiplayer integration tests (high thread count)
# - coverage: code coverage via cargo-llvm-cov, uploaded to Codecov
# - gdscript: gdformat --check + gdlint
# - gdscript-parse-check: build gdext + launch Godot to check all scripts load
# - gdscript-unit-tests: GUT-based GDScript unit tests (no Rust/bridge needed)
#
# Triggers on pushes and pull requests that touch relevant files, and on
# workflow_dispatch (used by Build & Package to ensure CI passes before building).

name: CI

on:
  workflow_dispatch:
  push:
    paths:
      - "**.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rustfmt.toml"
      - "elven_canopy_*/Cargo.toml"
      - "tabulosity/**"
      - "tabulosity_derive/**"
      - "multiplayer_tests/**"
      - "godot/scripts/**.gd"
      - "godot/test/**.gd"
      - "godot/addons/gut/**"
      - "godot/.gutconfig.json"
      - ".gdlintrc"
      - "python/requirements-dev.txt"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "**.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rustfmt.toml"
      - "elven_canopy_*/Cargo.toml"
      - "tabulosity/**"
      - "tabulosity_derive/**"
      - "multiplayer_tests/**"
      - "godot/scripts/**.gd"
      - "godot/test/**.gd"
      - "godot/addons/gut/**"
      - "godot/.gutconfig.json"
      - ".gdlintrc"
      - "python/requirements-dev.txt"
      - ".github/workflows/ci.yml"

# Override the workspace opt-level=1 (from Cargo.toml [profile.dev]) to avoid
# the optimization compile-time cost in CI, where cold builds are common.
env:
  CARGO_PROFILE_DEV_OPT_LEVEL: 0
  # *** CACHE_EPOCH — MUST BE KEPT IN SYNC WITH build-and-package.yml ***
  # Bump this to invalidate ALL caches (apt packages AND Rust dependency
  # artifacts). You MUST bump it in BOTH workflow files at the same time.
  # Reasons to bump: apt dependency changes that affect compiled output
  # (e.g., new libclang version changing bindgen output), or stale cache
  # causing mysterious build failures.
  # Last bumped: 2026-04-07
  CACHE_EPOCH: v2
  # Forces all JS-based actions to run on Node 24 ahead of GitHub's mandatory
  # switch on 2026-06-02. Becomes a no-op after that date and can be removed.
  # (Assessed 2026-04-07.)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      # Swatinem/rust-cache: stay on @v2 — there is no v3. The v2 line already
      # uses @actions/cache v6+ internally (fixed in v2.7.8), so it is NOT
      # affected by the actions/cache v1/v2 deprecation. Only caches dependency
      # artifacts (not workspace crates) by default. (Assessed 2026-04-07.)
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ env.CACHE_EPOCH }}

      - uses: ./.github/actions/install-llama-deps
        with:
          cache-epoch: ${{ env.CACHE_EPOCH }}

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --workspace -- -D warnings

  gdext-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ env.CACHE_EPOCH }}

      - uses: ./.github/actions/install-llama-deps
        with:
          cache-epoch: ${{ env.CACHE_EPOCH }}

      - name: Compile-check gdext
        run: cargo build -p elven_canopy_gdext

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ env.CACHE_EPOCH }}

      - uses: ./.github/actions/install-llama-deps
        with:
          cache-epoch: ${{ env.CACHE_EPOCH }}

      # Tabulosity tests run separately to avoid Cargo feature unification:
      # elven_canopy_sim depends on tabulosity with features=["serde"], which
      # would activate the serde feature for tabulosity's own test targets.
      - name: Run tabulosity tests
        run: cargo test -p tabulosity -p tabulosity_derive -- --test-threads=16

      - name: Run tabulosity serde tests
        run: cargo test -p tabulosity --features serde --test serde -- --test-threads=16

      - name: Run all other crate tests
        run: cargo test -p elven_canopy_prng -p elven_canopy_lang -p elven_canopy_sim -p elven_canopy_graphics -p elven_canopy_protocol -p elven_canopy_relay -p elven_canopy_music -p multiplayer_tests -- --test-threads=16

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ env.CACHE_EPOCH }}

      - uses: ./.github/actions/install-llama-deps
        with:
          cache-epoch: ${{ env.CACHE_EPOCH }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # Tabulosity runs separately to avoid Cargo feature unification (see rust-test job).
      - name: Generate tabulosity coverage
        run: cargo llvm-cov --no-report -p tabulosity -p tabulosity_derive -- --test-threads=16

      - name: Generate coverage (other crates)
        run: cargo llvm-cov --no-report --workspace --exclude elven_canopy_gdext --exclude tabulosity --exclude tabulosity_derive -- --test-threads=16

      - name: Generate coverage report
        run: cargo llvm-cov report --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false

  gdscript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gdtoolkit
        run: pip install -r python/requirements-dev.txt

      - name: Check GDScript formatting
        run: gdformat --check --line-length 100 godot/scripts/*.gd godot/test/*.gd

      - name: Run GDScript linter
        run: gdlint godot/scripts/*.gd godot/test/*.gd

  gdscript-parse-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ env.CACHE_EPOCH }}

      - uses: ./.github/actions/install-llama-deps
        with:
          cache-epoch: ${{ env.CACHE_EPOCH }}

      - name: Build gdext
        run: cargo build -p elven_canopy_gdext

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip
          unzip -q Godot_v4.6.1-stable_linux.x86_64.zip
          sudo mv Godot_v4.6.1-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Ensure godot/target symlink
        run: ln -sf ../target godot/target

      - name: Import Godot project
        run: godot --path godot --headless --import --quit 2>/dev/null || true

      - name: Check GDScript parse validity
        run: |
          OUTPUT="$(xvfb-run -a godot --path godot --quit 2>&1)" || true
          if printf '%s' "$OUTPUT" | grep -q "SCRIPT ERROR"; then
            echo "$OUTPUT" >&2
            echo "GDScript parse check failed!" >&2
            exit 1
          fi
          if ! printf '%s' "$OUTPUT" | grep -q "GDScript preload complete"; then
            echo "$OUTPUT" >&2
            echo "GDScript parse check failed: preload confirmation missing!" >&2
            exit 1
          fi
          echo "GDScript parse check passed."

  gdscript-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ env.CACHE_EPOCH }}

      - uses: ./.github/actions/install-llama-deps
        with:
          cache-epoch: ${{ env.CACHE_EPOCH }}

      - name: Build gdext
        run: cargo build -p elven_canopy_gdext

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip
          unzip -q Godot_v4.6.1-stable_linux.x86_64.zip
          sudo mv Godot_v4.6.1-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Ensure godot/target symlink
        run: ln -sf ../target godot/target

      - name: Import Godot project
        run: godot --path godot --headless --import --quit 2>/dev/null || true

      - name: Run GDScript unit tests (GUT)
        run: timeout 60 xvfb-run -a godot --path godot --headless --script res://test/gut_runner.gd
